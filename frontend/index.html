<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>TAEHEON MOVIE WORLD</title>
    <style>
        body { background-color: #141414; color: white; font-family: Arial, sans-serif; text-align: center; }
        .movie-container { display: flex; flex-wrap: wrap; justify-content: center; padding: 20px; }
        .movie-card { margin: 15px; width: 200px; cursor: pointer; transition: 0.3s; }
        .movie-card:hover { transform: scale(1.1); }
        .movie-card img { width: 100%; border-radius: 10px; }
        h1 { color: #E50914; margin-top: 50px; }
    </style>
</head>
<body>
    <h1>TAEHEON MOVIE WORLD</h1>
    <div id="movie-list" class="movie-container">영화 데이터를 불러오는 중...</div>

    <script>
        // ⚠️ 아래 주소를 태헌님의 새로운 API Gateway 주소로 바꾸세요!
        const API_URL = "https://5s69ymb9h7.execute-api.ap-northeast-2.amazonaws.com/prod/";

        async function fetchMovies() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                const list = document.getElementById('movie-list');
                list.innerHTML = '';

                data.forEach(movie => {
                    const card = document.createElement('div');
                    card.className = 'movie-card';
                    card.innerHTML = `
                        <img src="${movie.poster_url}" alt="${movie.title}">
                        <h3>${movie.title}</h3>
                        <p>⭐ ${movie.avg_rating} (${movie.comment_count})</p>
                    `;
                    // 클릭 시 상세 페이지로 이동 (ID 전달)
                    card.onclick = () => { location.href = `detail.html?id=${movie.id}`; };
                    list.appendChild(card);
                });
            } catch (error) {
                document.getElementById('movie-list').innerText = "데이터를 가져오는데 실패했습니다.";
                console.error(error);
            }
        }
        fetchMovies();
    </script>
</body>
</html>
